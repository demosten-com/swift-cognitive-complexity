name: Cognitive Complexity Check

on:
  workflow_call:
    inputs:
      warning_threshold:
        description: 'Per-function warning threshold'
        type: number
        default: 15
      error_threshold:
        description: 'Per-function error threshold (fails the check)'
        type: number
        default: 25
      swiftui_aware:
        description: 'Enable SwiftUI-aware mode (suppress layout container nesting)'
        type: boolean
        default: true
      fail_on_increase:
        description: 'Fail if any function complexity increased above warning threshold'
        type: boolean
        default: false
      scc_version:
        description: 'Version of scc to use (tag, branch, or commit SHA)'
        type: string
        default: 'main'

jobs:
  complexity-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Cache scc binary
        id: cache-scc
        uses: actions/cache@v4
        with:
          path: /tmp/scc-bin
          key: scc-${{ inputs.scc_version }}-linux-x86_64

      - name: Build scc
        if: steps.cache-scc.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth 1 --branch ${{ inputs.scc_version }} https://github.com/${{ github.repository_owner }}/swift-cognitive-complexity.git scc-src
          cd scc-src
          swift build -c release --static-swift-stdlib
          mkdir -p /tmp/scc-bin
          cp .build/release/scc /tmp/scc-bin/scc

      - name: Detect changed Swift files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: '**/*.swift'

      - name: Run complexity analysis (annotations)
        if: steps.changed.outputs.any_changed == 'true'
        id: annotations
        run: |
          echo "${{ steps.changed.outputs.all_changed_files }}" | tr ' ' '\n' > /tmp/changed-files.txt
          /tmp/scc-bin/scc diff \
            --base-ref "origin/${{ github.event.pull_request.base.ref }}" \
            --changed-files /tmp/changed-files.txt \
            --format github \
            --warning-threshold ${{ inputs.warning_threshold }} \
            --error-threshold ${{ inputs.error_threshold }} \
            ${{ inputs.swiftui_aware && '--swiftui-aware' || '' }} \
            ${{ inputs.fail_on_increase && '--fail-on-increase' || '' }} \
          || echo "scc_exit_code=$?" >> "$GITHUB_ENV"

      - name: Generate PR comment
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          echo "${{ steps.changed.outputs.all_changed_files }}" | tr ' ' '\n' > /tmp/changed-files.txt
          /tmp/scc-bin/scc diff \
            --base-ref "origin/${{ github.event.pull_request.base.ref }}" \
            --changed-files /tmp/changed-files.txt \
            --format markdown \
            --warning-threshold ${{ inputs.warning_threshold }} \
            --error-threshold ${{ inputs.error_threshold }} \
            ${{ inputs.swiftui_aware && '--swiftui-aware' || '' }} \
          > /tmp/complexity-report.md || true

      - name: Generate empty report
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Swift files changed in this PR." > /tmp/complexity-report.md

      - name: Post PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/complexity-report.md

      - name: Apply exit code
        if: env.scc_exit_code != '' && env.scc_exit_code != '0'
        run: exit ${{ env.scc_exit_code }}
